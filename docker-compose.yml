services:
  ai-dev:
    build: .
    container_name: ai-dev

    ports:
      - "2222:22"
      - "8080:8080"
      - "4096:4096"

    volumes:
      - ./workspace:/workspace
      - ai-home:/home/dev
      - .ssh/id_ed25519.pub:/home/dev/.ssh/authorized_keys:ro

    environment:
      - TZ=Asia/Tokyo
      - OPENCODE_MODEL=${OPENCODE_MODEL:-opencode/deepseek-v4-flash-free}

    secrets:
      - github_token
      - github_username
      - gitlab_token
      - gitlab_username
      - opencode_zen_api_key
      - opencode_go_api_key
      - opencode_server_password

    restart: unless-stopped

secrets:
  github_token:
    file: ./secrets/github_token
  github_username:
    file: ./secrets/github_username
  gitlab_token:
    file: ./secrets/gitlab_token
  gitlab_username:
    file: ./secrets/gitlab_username
  opencode_zen_api_key:
    file: ./secrets/opencode_zen_api_key
  opencode_go_api_key:
    file: ./secrets/opencode_go_api_key
  opencode_server_password:
    file: ./secrets/opencode_server_password

volumes:
  ai-home:
