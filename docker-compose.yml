services:
  ai-dev:
    build: .
    container_name: ai-dev

    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}

    ports:
      - "2222:22"
      - "8080:8080"

    volumes:
      - ./workspace:/workspace
      - ai-home:/home/dev
      - .ssh/id_ed25519.pub:/home/dev/.ssh/authorized_keys:ro

    secrets:
      - github_token
      - github_username
      - gitlab_token
      - gitlab_username
      - opencode_api_key

    restart: unless-stopped

secrets:
  github_token:
    file: ./secrets/github_token
  github_username:
    file: ./secrets/github_username
  gitlab_token:
    file: ./secrets/gitlab_token
  gitlab_username:
    file: ./secrets/gitlab_username
  opencode_api_key:
    file: ./secrets/opencode_api_key

volumes:
  ai-home:
